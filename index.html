<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You Restaurant Web App</title>
  <style>
    :root {
      --bg: #fff8ef;
      --card: #ffffff;
      --dark: #23170f;
      --muted: #6e6258;
      --accent: #c85a24;
      --accent2: #f3b35b;
      --green: #26805f;
      --red: #b63b3b;
      --line: #ead8c6;
      --soft: #fff0db;
      --shadow: 0 12px 30px rgba(78, 45, 20, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--dark);
    }

    button, input, select, textarea {
      font-family: inherit;
      font-size: 15px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .primary { background: var(--accent); color: white; }
    .secondary { background: var(--soft); color: var(--dark); border: 1px solid var(--line); }
    .danger { background: var(--red); color: white; }
    .success { background: var(--green); color: white; }
    .ghost { background: transparent; border: 1px solid var(--line); color: var(--dark); }
    .disabled { opacity: 0.45; pointer-events: none; }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(255, 248, 239, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .topbar {
      max-width: 1180px;
      margin: auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: 20px;
      letter-spacing: -0.5px;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--dark);
      color: var(--accent2);
      font-size: 13px;
      font-weight: 900;
    }

    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    nav button {
      background: white;
      border: 1px solid var(--line);
      padding: 8px 10px;
    }

    nav button.active {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    main {
      max-width: 1180px;
      margin: auto;
      padding: 22px 18px 60px;
    }

    .section { display: none; }
    .section.active { display: block; }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      align-items: stretch;
      margin-top: 10px;
    }

    .hero-card, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 34px;
      background: linear-gradient(135deg, white, #fff0db);
    }

    h1 { font-size: 44px; margin: 0 0 12px; line-height: 1.05; }
    h2 { font-size: 28px; margin: 0 0 16px; }
    h3 { margin: 0 0 10px; }
    p { color: var(--muted); line-height: 1.5; }

    .hero-actions, .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .hero-side {
      padding: 22px;
      display: grid;
      gap: 12px;
    }

    .stat-box {
      background: var(--soft);
      border: 1px solid var(--line);
      padding: 16px;
      border-radius: 18px;
    }
    .stat-value { font-size: 24px; font-weight: 900; }
    .stat-label { color: var(--muted); font-size: 13px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card { padding: 18px; }
    .dish-card { display: flex; flex-direction: column; gap: 10px; }
    .dish-img {
      height: 120px;
      border-radius: 16px;
      background: linear-gradient(135deg, #442315, #f3b35b);
      display: flex;
      align-items: end;
      padding: 12px;
      color: white;
      font-weight: 900;
    }
    .dish-meta { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .price { font-weight: 900; color: var(--accent); }
    .tag { font-size: 12px; padding: 5px 8px; border-radius: 999px; background: var(--soft); color: var(--muted); border: 1px solid var(--line); }
    .tag.green { background: #e9fff6; color: var(--green); border-color: #bcecd7; }
    .tag.red { background: #fff0f0; color: var(--red); border-color: #f0c5c5; }
    .tag.dark { background: var(--dark); color: white; }

    .toolbar {
      display: flex;
      gap: 10px;
      margin: 14px 0 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    .input, textarea, select {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: white;
      outline: none;
    }

    .toolbar .input { max-width: 330px; }

    .category-btn.active { background: var(--dark); color: white; }

    .cart-line, .order-line, .staff-line, .mini-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .cart-line:last-child, .order-line:last-child, .staff-line:last-child, .mini-line:last-child { border-bottom: 0; }

    .qty { display: flex; align-items: center; gap: 8px; }
    .qty button { padding: 6px 10px; }

    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .full { grid-column: 1 / -1; }

    .status-steps { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 18px 0; }
    .step {
      border: 1px solid var(--line);
      background: white;
      border-radius: 14px;
      padding: 12px 8px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .step.done { background: var(--dark); color: white; border-color: var(--dark); }
    .step.cancelled { background: var(--red); color: white; border-color: var(--red); }

    .login-box { max-width: 420px; margin: 30px auto; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .tabs button.active { background: var(--accent); color: white; }

    .order-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: white;
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .order-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .order-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 20;
      padding: 20px;
      overflow: auto;
    }
    .modal-backdrop.show { display: grid; place-items: center; }
    .modal {
      width: min(620px, 100%);
      background: white;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .chat-box {
      height: 360px;
      overflow: auto;
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .msg { padding: 10px 12px; border-radius: 14px; margin: 8px 0; max-width: 85%; }
    .user-msg { margin-left: auto; background: var(--dark); color: white; }
    .bot-msg { background: var(--soft); border: 1px solid var(--line); }

    .notice {
      background: #fff3cd;
      border: 1px solid #f1d58b;
      color: #6a4a00;
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 14px;
    }

    .footer-note {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 850px) {
      .hero, .grid-2 { grid-template-columns: 1fr; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      h1 { font-size: 34px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      nav { justify-content: flex-start; }
      .status-steps { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .hero-card { padding: 22px; }
      .cart-line, .order-line, .staff-line { align-items: flex-start; flex-direction: column; }
    }
  
    /* Delivery page wireframe-inspired design */
    .delivery-shell{max-width:980px;margin:auto}
    .delivery-top{display:flex;align-items:center;justify-content:space-between;gap:16px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 18px;box-shadow:var(--shadow);margin-bottom:18px}
    .delivery-logo{width:46px;height:46px;border-radius:14px;border:1px solid var(--line);display:grid;place-items:center;font-weight:900;background:var(--soft);color:var(--dark)}
    .delivery-tabs{display:flex;gap:24px;align-items:center}
    .delivery-tabs button{background:transparent;border-radius:0;border-bottom:3px solid transparent;padding:10px 4px;color:var(--muted)}
    .delivery-tabs button.active{color:var(--dark);border-bottom-color:var(--dark)}
    .profile-pill{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;background:#fff;font-weight:900}
    .delivery-title-row{display:flex;align-items:center;gap:10px;margin:10px 0 16px}
    .order-count{background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:6px 10px;color:var(--muted);font-weight:700;font-size:13px}
    .delivery-order-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
    .delivery-order-card.muted{opacity:.55;box-shadow:none;background:#fff}
    .delivery-card-main{display:grid;grid-template-columns:110px 1fr auto;gap:14px;align-items:start}
    .status-pill{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;font-weight:800;font-size:12px;border:1px solid var(--line);white-space:nowrap}
    .status-pill.dark{background:var(--dark);color:#fff;border-color:var(--dark)}
    .status-pill.pending{background:#fff;border-color:var(--line);color:var(--muted)}
    .status-pill.delivered{background:#eef7ee;border-color:#cfe6cf;color:#4a704a}
    .delivery-actions{border-top:1px solid var(--line);padding-top:14px;margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .delivery-actions button{min-width:130px}
    .delivery-primary-wide{min-width:220px!important;background:var(--dark);color:white}
    .delivery-legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 18px;margin-top:18px;color:var(--muted)}
    .delivery-grid{display:grid;grid-template-columns:1.7fr .9fr;gap:20px}
    .performance-card,.calendar-card,.shift-card,.quick-stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
    .bar-chart{display:flex;align-items:end;gap:8px;height:62px;border:1px dashed var(--line);border-radius:12px;padding:10px;background:#fff}
    .bar-chart span{display:block;width:22px;background:#c9c9c9;border-radius:4px 4px 0 0}
    .shift-row{display:grid;grid-template-columns:28px 1fr 1fr 70px 40px;gap:10px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:10px;margin:10px 0;background:#fff}
    .shift-dot{width:12px;height:12px;border-radius:50%;border:2px solid #c9c9c9}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px;text-align:center}
    .calendar-day{padding:7px 0;border-radius:8px;font-size:12px;color:var(--muted)}
    .calendar-day.has-shift{background:var(--soft);color:var(--dark);font-weight:800}
    .calendar-day.selected{background:var(--dark);color:#fff}
    .quick-stat{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .mini-meter{width:54px;height:9px;border-radius:99px;background:#c9c9c9}
    @media(max-width:850px){.delivery-grid,.delivery-card-main{grid-template-columns:1fr}.delivery-top{align-items:flex-start;flex-direction:column}.delivery-tabs{gap:12px}.shift-row{grid-template-columns:1fr}.delivery-actions button{width:100%}}

    /* Manager internal shell */
    .mgr-shell{max-width:980px;margin:auto}
    .mgr-topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 20px;box-shadow:var(--shadow);margin-bottom:18px;flex-wrap:wrap}
    .mgr-logo{width:44px;height:44px;border-radius:14px;border:1px solid #f0c5c5;display:grid;place-items:center;font-weight:900;background:#fce8e8;color:#a02020;font-size:13px}
    .mgr-tabs{display:flex;gap:28px;align-items:center}
    .mgr-tabs button{background:transparent;border-radius:0;border-bottom:3px solid transparent;padding:10px 4px;color:var(--muted);font-weight:700;font-size:15px}
    .mgr-tabs button.active{color:var(--dark);border-bottom-color:var(--dark)}
    .mgr-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
    .mgr-toolbar select,.mgr-search{padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:white;outline:none;font-size:14px;font-family:inherit}
    .mgr-search{flex:1;min-width:180px;max-width:340px}
    .mgr-bulk-bar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 14px;margin-bottom:14px;flex-wrap:wrap}
    .mgr-order-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 18px;margin-bottom:12px;box-shadow:0 4px 12px rgba(78,45,20,.07)}
    .mgr-order-card.muted-card{opacity:.5;box-shadow:none}
    .mgr-order-main{display:grid;grid-template-columns:24px 1fr auto;gap:14px;align-items:start}
    .mgr-order-info{display:flex;flex-direction:column;gap:5px}
    .mgr-order-actions{display:flex;flex-direction:column;gap:6px;align-items:stretch;min-width:150px}
    .mgr-order-actions button{width:100%;text-align:center}
    .status-tag{font-size:12px;padding:4px 9px;border-radius:999px;font-weight:700;border:1px solid var(--line);display:inline-block}
    .s-received{background:#fff8e6;color:#8a5e00;border-color:#f5d78a}
    .s-accepted{background:#e8f4ff;color:#1a5fa8;border-color:#aacfef}
    .s-preparing{background:#fff0e0;color:#b85c00;border-color:#f5c68a}
    .s-assigned{background:#f0e8ff;color:#6a2fa0;border-color:#c9a8ef}
    .s-transit{background:#e8f7ff;color:#1a7a9a;border-color:#9ad8ef}
    .s-delivered{background:#e8fff3;color:#1a7a4a;border-color:#9aefc4}
    .s-rejected{background:#fff0f0;color:#9a1a1a;border-color:#efaaaa}
    /* Toggle switch */
    .avail-toggle{display:flex;align-items:center;gap:10px}
    .toggle-sw{position:relative;display:inline-block;width:48px;height:26px;cursor:pointer;flex-shrink:0}
    .toggle-sw input{opacity:0;width:0;height:0;position:absolute}
    .toggle-track{position:absolute;inset:0;background:#ccc;border-radius:99px;transition:.2s}
    .toggle-sw input:checked+.toggle-track{background:var(--green)}
    .toggle-thumb{position:absolute;left:3px;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);pointer-events:none}
    .toggle-sw input:checked~.toggle-thumb{left:25px}
    /* AI chips */
    .chat-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .chip{padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s}
    .chip:hover{background:var(--soft)}
    /* AI item card in chat */
    .ai-item-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--line)}
    @media(max-width:850px){.mgr-topbar{flex-direction:column;align-items:flex-start}.mgr-order-main{grid-template-columns:24px 1fr}.mgr-order-actions{flex-direction:row;flex-wrap:wrap;min-width:unset;width:100%}.mgr-order-actions button{width:auto}}
    @media(max-width:560px){.mgr-order-main{grid-template-columns:1fr}.mgr-order-actions{align-items:flex-start}}
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand"><div class="logo">FY</div><span>For You Restaurant</span></div>
      <nav id="nav"></nav>
    </div>
  </header>

  <main>
    <section id="home" class="section active"></section>
    <section id="menu" class="section"></section>
    <section id="cart" class="section"></section>
    <section id="track" class="section"></section>
    <section id="assistant" class="section"></section>
    <section id="manager" class="section"></section>
    <section id="delivery" class="section"></section>
    <div class="footer-note">Academic beta prototype for System Analysis and Design. Data is stored locally in this browser for demonstration.</div>
  </main>

  <div id="modalBackdrop" class="modal-backdrop">
    <div id="modal" class="modal"></div>
  </div>

  <script>
    const STORE_KEY = 'for_you_restaurant_demo_v1';
    const MANAGER_PIN = '1234';
    const DELIVERY_PIN = '2222';

    const initialMenu = [
      {id: 'burger-classic', name: 'Classic Burger', category: 'Burgers', price: 48, prep: '15-20 min', ingredients: ['beef', 'cheese', 'lettuce', 'sauce'], desc: 'Juicy burger with cheese, fresh lettuce, and house sauce.', available: true},
      {id: 'chicken-tacos', name: 'Chicken Tacos', category: 'Tacos', price: 45, prep: '15-20 min', ingredients: ['chicken', 'fries', 'cheese', 'sauce'], desc: 'Golden tacos filled with chicken, fries, and creamy sauce.', available: true},
      {id: 'sushi-box', name: 'Mini Sushi Box', category: 'Sushi', price: 65, prep: '20-25 min', ingredients: ['rice', 'salmon', 'avocado', 'nori'], desc: 'A small sushi box for a light but complete meal.', available: true},
      {id: 'mac-cheese', name: 'Mac n Cheese', category: 'Pasta', price: 42, prep: '12-18 min', ingredients: ['pasta', 'cheese', 'cream'], desc: 'Creamy pasta with melted cheese and a rich sauce.', available: true},
      {id: 'caesar-salad', name: 'Caesar Salad', category: 'Salads', price: 38, prep: '10-15 min', ingredients: ['lettuce', 'chicken', 'parmesan', 'croutons'], desc: 'Fresh salad for customers looking for something lighter.', available: true},
      {id: 'for-you-plate', name: 'For You Plate', category: 'Plates', price: 72, prep: '20-30 min', ingredients: ['chicken', 'rice', 'fries', 'sauce'], desc: 'Large plate for hungry customers with sides and sauce.', available: true},
      {id: 'fries', name: 'Fries', category: 'Sides', price: 15, prep: '5-10 min', ingredients: ['potato', 'salt'], desc: 'Crispy fries, easy to pair with burgers and tacos.', available: true},
      {id: 'nuggets', name: 'Chicken Nuggets', category: 'Sides', price: 28, prep: '10-12 min', ingredients: ['chicken', 'breadcrumbs'], desc: 'Crispy chicken nuggets with dipping sauce.', available: true},
      {id: 'mango-juice', name: 'Mango Juice', category: 'Drinks', price: 22, prep: '5 min', ingredients: ['mango', 'water', 'sugar'], desc: 'Fresh mango drink, commonly paired with spicy meals.', available: true},
      {id: 'cola', name: 'Cola', category: 'Drinks', price: 12, prep: '2 min', ingredients: ['soft drink'], desc: 'Cold soft drink for delivery orders.', available: true},
      {id: 'cheesecake', name: 'Cheesecake', category: 'Desserts', price: 32, prep: '5 min', ingredients: ['cream cheese', 'biscuit', 'sugar'], desc: 'Sweet dessert to finish the order.', available: true},
      {id: 'chocolate-cake', name: 'Chocolate Cake', category: 'Desserts', price: 30, prep: '5 min', ingredients: ['chocolate', 'flour', 'cream'], desc: 'Soft chocolate cake slice.', available: true}
    ];

    const deliveryPeople = [
      {id: 'd1', name: 'Yassine', phone: '0600-111-222', available: true},
      {id: 'd2', name: 'Imad', phone: '0600-333-444', available: true},
      {id: 'd3', name: 'Omar', phone: '0600-555-666', available: false}
    ];

    const statusOrder = ['Order received', 'Accepted', 'Preparing', 'Assigned to delivery', 'Out for delivery', 'Delivered'];
    const CHAT_KEY = 'for_you_chat_v1';

    let state = loadState();
    let currentPage = 'home';
    let managerLoggedIn = false;
    let deliveryLoggedIn = false;
    let deliveryPersonId = 'd1';
    let deliveryTab = 'orders';
    let managerTab = 'orders';
    let menuFilter = 'All';
    let searchText = '';
    let mgrDateFilter = 'All';
    let mgrStatusFilter = 'All';
    let mgrSearch = '';
    let selectedOrders = new Set();

    // Chat uses sessionStorage — fresh per browser session, persistent within same tab
    function loadChat() {
      try { const s = sessionStorage.getItem(CHAT_KEY); if (s) return JSON.parse(s); } catch(e) {}
      return [{from:'bot', text:'Hi, welcome to For You Restaurant! How can I help you today? 🍽️', items:[]}];
    }
    function saveChat() { try { sessionStorage.setItem(CHAT_KEY, JSON.stringify(chatMessages)); } catch(e) {} }
    let chatMessages = loadChat();

    function loadState() {
      const saved = localStorage.getItem(STORE_KEY);
      if (saved) return JSON.parse(saved);
      const seed = {
        menu: initialMenu,
        cart: {},
        orders: [
          {
            id: 'FY-1001', createdAt: new Date(Date.now() - 1000 * 60 * 42).toISOString(), status: 'Accepted',
            acceptedAt: Date.now() - 1000 * 60 * 42,
            customer: {name: 'Sample Customer', phone: '0612-000-111', address: 'AUI Campus, Ifrane', instructions: 'Call when outside'},
            payment: 'Cash', deliveryId: '', deliveryAccepted: false,
            items: [{id: 'chicken-tacos', name: 'Chicken Tacos', price: 45, qty: 2}, {id: 'mango-juice', name: 'Mango Juice', price: 22, qty: 1}], total: 112
          },
          {
            id: 'FY-1002', createdAt: new Date(Date.now() - 1000 * 60 * 18).toISOString(), status: 'Order received',
            acceptedAt: null,
            customer: {name: 'Test Order', phone: '0600-222-333', address: 'Downtown Ifrane', instructions: ''},
            payment: 'Card at delivery', deliveryId: '', deliveryAccepted: false,
            items: [{id: 'burger-classic', name: 'Classic Burger', price: 48, qty: 1}, {id: 'fries', name: 'Fries', price: 15, qty: 1}], total: 63
          }
        ],
        deliveryPeople,
        lastOrderId: 'FY-1002'
      };
      localStorage.setItem(STORE_KEY, JSON.stringify(seed));
      return seed;
    }

    function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

    // 5-minute timer: auto-advance Accepted → Preparing
    function checkPrepTimers() {
      let changed = false;
      state.orders.forEach(o => {
        if (o.status === 'Accepted' && o.acceptedAt) {
          if (Date.now() - o.acceptedAt >= 5 * 60 * 1000) {
            o.status = 'Preparing';
            changed = true;
          }
        }
      });
      if (changed) { saveState(); renderAll(); }
    }
    checkPrepTimers();
    setInterval(checkPrepTimers, 30000);

    function money(n) { return `${n} MAD`; }
    function byId(id) { return document.getElementById(id); }
    function getMenuItem(id) { return state.menu.find(x => x.id === id); }
    function getDeliveryName(id) { const d = state.deliveryPeople.find(x => x.id === id); return d ? d.name : 'Not assigned'; }

    function navItems() {
      return [
        ['home', 'Home'], ['menu', 'Menu'], ['cart', `Cart (${cartCount()})`], ['track', 'Track Order'],
        ['assistant', 'AI Assistant'], ['manager', 'Manager'], ['delivery', 'Delivery']
      ];
    }

    function renderNav() {
      byId('nav').innerHTML = navItems().map(([id, label]) =>
        `<button class="${currentPage === id ? 'active' : ''}" onclick="go('${id}')">${label}</button>`
      ).join('');
    }

    function go(page) {
      currentPage = page;
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      byId(page).classList.add('active');
      renderAll();
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function renderAll() {
      renderNav();
      renderHome();
      renderMenu();
      renderCart();
      renderTrack();
      renderAssistant();
      renderManager();
      renderDelivery();
    }

    function cartCount() { return Object.values(state.cart).reduce((sum, q) => sum + q, 0); }
    function cartItems() {
      return Object.entries(state.cart).map(([id, qty]) => ({...getMenuItem(id), qty})).filter(x => x.id);
    }
    function cartTotal() { return cartItems().reduce((sum, x) => sum + x.price * x.qty, 0); }

    function renderHome() {
      const delivered = state.orders.filter(o => o.status === 'Delivered').length;
      byId('home').innerHTML = `
        <div class="hero">
          <div class="hero-card">
            <span class="tag dark">Mobile-friendly ordering system</span>
            <h1>Order from For You without waiting on the phone.</h1>
            <p>This academic prototype digitizes menu browsing, checkout, order tracking, manager order control, delivery assignment, and basic analytics.</p>
            <div class="hero-actions">
              <button class="primary" onclick="go('menu')">Order Now</button>
              <button class="secondary" onclick="go('assistant')">Ask the Assistant</button>
              <button class="ghost" onclick="go('manager')">Manager Dashboard</button>
            </div>
          </div>
          <div class="hero-side card">
            <div class="stat-box"><div class="stat-value">${state.menu.length}</div><div class="stat-label">Menu items</div></div>
            <div class="stat-box"><div class="stat-value">${state.orders.length}</div><div class="stat-label">Orders in demo system</div></div>
            <div class="stat-box"><div class="stat-value">${delivered}</div><div class="stat-label">Delivered orders</div></div>
          </div>
        </div>
        <h2 style="margin-top:28px">Featured dishes</h2>
        <div class="grid">${state.menu.slice(0, 6).map(dishCard).join('')}</div>
      `;
    }

    function renderMenu() {
      const categories = ['All', ...new Set(state.menu.map(x => x.category))];
      const items = state.menu.filter(item =>
        (menuFilter === 'All' || item.category === menuFilter) &&
        (item.name.toLowerCase().includes(searchText.toLowerCase()) || item.desc.toLowerCase().includes(searchText.toLowerCase()))
      );
      byId('menu').innerHTML = `
        <h2>Our Menu</h2>
        <p>Browse dishes, check details, and add available items to the cart.</p>
        <div class="toolbar">
          <input class="input" placeholder="Search for burgers, sushi, drinks..." value="${escapeHtml(searchText)}" oninput="searchText=this.value; renderMenu()" />
          ${categories.map(c => `<button class="category-btn secondary ${menuFilter === c ? 'active' : ''}" onclick="menuFilter='${c}'; renderMenu()">${c}</button>`).join('')}
        </div>
        <div class="grid">${items.map(dishCard).join('')}</div>
      `;
    }

    function dishCard(item) {
      const unavailable = !item.available;
      return `
        <div class="card dish-card">
          <div class="dish-img">${item.category}</div>
          <div class="dish-meta"><h3>${item.name}</h3><span class="price">${money(item.price)}</span></div>
          <div class="row"><span class="tag">${item.prep}</span><span class="tag ${item.available ? 'green' : 'red'}">${item.available ? 'Available' : 'Unavailable'}</span></div>
          <p>${item.desc}</p>
          <div class="row">
            <button class="secondary" onclick="openItem('${item.id}')">View Details</button>
            <button class="primary ${unavailable ? 'disabled' : ''}" onclick="addToCart('${item.id}')">Add to Cart</button>
          </div>
        </div>
      `;
    }

    function openItem(id) {
      const item = getMenuItem(id);
      showModal(`
        <h2>${item.name}</h2>
        <p>${item.desc}</p>
        <div class="mini-line"><strong>Price</strong><span>${money(item.price)}</span></div>
        <div class="mini-line"><strong>Preparation time</strong><span>${item.prep}</span></div>
        <div class="mini-line"><strong>Ingredients</strong><span>${item.ingredients.join(', ')}</span></div>
        <div class="mini-line"><strong>Availability</strong><span>${item.available ? 'Available' : 'Unavailable'}</span></div>
        <div class="row" style="margin-top:16px">
          <button class="primary ${item.available ? '' : 'disabled'}" onclick="addToCart('${item.id}'); closeModal()">Add to Cart</button>
          <button class="secondary" onclick="closeModal()">Close</button>
        </div>
      `);
    }

    function addToCart(id) {
      const item = getMenuItem(id);
      if (!item || !item.available) return alert('This item is currently unavailable.');
      state.cart[id] = (state.cart[id] || 0) + 1;
      saveState();
      renderAll();
    }

    function changeQty(id, delta) {
      state.cart[id] = (state.cart[id] || 0) + delta;
      if (state.cart[id] <= 0) delete state.cart[id];
      saveState(); renderAll();
    }

    function removeFromCart(id) { delete state.cart[id]; saveState(); renderAll(); }

    function renderCart() {
      const items = cartItems();
      const suggestions = getUpsellSuggestions();
      byId('cart').innerHTML = `
        <h2>Cart & Checkout</h2>
        ${items.length === 0 ? `<div class="card"><p>Your cart is empty.</p><button class="primary" onclick="go('menu')">Browse Menu</button></div>` : `
          <div class="grid-2">
            <div class="card">
              <h3>Order Summary</h3>
              ${items.map(x => `
                <div class="cart-line">
                  <div><strong>${x.name}</strong><br><span class="tag">${money(x.price)} each</span></div>
                  <div class="qty"><button class="secondary" onclick="changeQty('${x.id}', -1)">-</button><strong>${x.qty}</strong><button class="secondary" onclick="changeQty('${x.id}', 1)">+</button></div>
                  <strong>${money(x.price * x.qty)}</strong>
                  <button class="danger" onclick="removeFromCart('${x.id}')">Remove</button>
                </div>`).join('')}
              <div class="cart-line"><strong>Total</strong><strong>${money(cartTotal())}</strong></div>
              <h3 style="margin-top:18px">Frequently ordered with</h3>
              ${suggestions.length ? suggestions.map(s => `<div class="mini-line"><span>${s.name} - ${money(s.price)}</span><button class="secondary" onclick="addToCart('${s.id}')">Add</button></div>`).join('') : '<p>No suggestion yet.</p>'}
            </div>
            <div class="card">
              <h3>Customer Information</h3>
              <div class="form-grid">
                <input id="custName" class="input" placeholder="Name" />
                <input id="custPhone" class="input" placeholder="Phone number" />
                <input id="custAddress" class="input full" placeholder="Delivery address" />
                <textarea id="custInstructions" class="full" placeholder="Delivery instructions or food preferences"></textarea>
                <select id="paymentMethod" class="input full"><option>Cash</option><option>Card at delivery</option></select>
              </div>
              <button class="primary" style="margin-top:14px;width:100%" onclick="placeOrder()">Confirm Order</button>
            </div>
          </div>`}
      `;
    }

    function getUpsellSuggestions() {
      const inCart = new Set(Object.keys(state.cart));
      const base = cartItems();
      let preferred = [];
      if (base.some(x => ['Burgers', 'Tacos', 'Plates'].includes(x.category))) preferred = ['fries', 'mango-juice', 'cola'];
      else if (base.some(x => ['Sushi', 'Salads'].includes(x.category))) preferred = ['mango-juice', 'cheesecake'];
      else preferred = ['fries', 'cola', 'chocolate-cake'];
      return preferred.map(getMenuItem).filter(x => x && x.available && !inCart.has(x.id)).slice(0, 3);
    }

    function placeOrder() {
      const items = cartItems();
      if (!items.length) return alert('Your cart is empty.');
      const unavailable = items.find(x => !x.available);
      if (unavailable) return alert(`${unavailable.name} is no longer available. Remove it before checkout.`);
      const name = byId('custName').value.trim();
      const phone = byId('custPhone').value.trim();
      const address = byId('custAddress').value.trim();
      const instructions = byId('custInstructions').value.trim();
      const payment = byId('paymentMethod').value;
      if (!name || !phone || !address) return alert('Please fill in name, phone number, and address.');
      const id = `FY-${Math.floor(1000 + Math.random() * 9000)}`;
      const order = {
        id, createdAt: new Date().toISOString(), status: 'Order received',
        acceptedAt: null, deliveryAccepted: false,
        customer: {name, phone, address, instructions}, payment, deliveryId: '',
        items: items.map(x => ({id: x.id, name: x.name, price: x.price, qty: x.qty})), total: cartTotal()
      };
      state.orders.unshift(order);
      state.cart = {};
      state.lastOrderId = id;
      saveState();
      alert(`Order confirmed. Your order ID is ${id}`);
      go('track');
    }

    function renderTrack() {
      const id = state.lastOrderId || '';
      const order = id ? state.orders.find(o => o.id === id) : null;
      byId('track').innerHTML = `
        <h2>Track Order</h2>
        <div class="card">
          <p>Enter an order ID or use the latest order created in this browser.</p>
          <div class="row"><input id="trackId" class="input" value="${id}" placeholder="Example: FY-1001" /><button class="primary" onclick="trackSpecificOrder()">Track</button></div>
        </div>
        <div id="trackingResult" style="margin-top:16px">${order ? trackingHtml(order) : '<p>No order selected yet.</p>'}</div>
      `;
    }

    function trackSpecificOrder() {
      const id = byId('trackId').value.trim().toUpperCase();
      state.lastOrderId = id;
      saveState();
      renderTrack();
    }

    function trackingHtml(order) {
      const isCancelled = order.status === 'Cancelled' || order.status === 'Rejected';
      const isAcceptedWaiting = order.status === 'Accepted' && order.acceptedAt;
      const minsLeft = isAcceptedWaiting ? Math.max(0, 5 - Math.round((Date.now() - order.acceptedAt) / 60000)) : 0;
      return `
        <div class="card">
          <div class="order-head"><div><h3>Order ${order.id}</h3><p>${order.customer.name} - ${money(order.total)}</p></div><span class="status-tag ${statusTagClass(order.status)}">${order.status}</span></div>
          ${isAcceptedWaiting ? `<div class="notice" style="margin:12px 0">⏱ Your order was accepted. Kitchen starts in ~${minsLeft} min.</div>` : ''}
          <div class="status-steps">${statusOrder.map(s => `<div class="step ${isCancelled ? 'cancelled' : (statusOrder.indexOf(s) <= statusOrder.indexOf(order.status) ? 'done' : '')}">${s}</div>`).join('')}</div>
          <div class="mini-line"><strong>Payment</strong><span>${order.payment}</span></div>
          <div class="mini-line"><strong>Delivery person</strong><span>${order.deliveryId ? getDeliveryName(order.deliveryId) : 'Not assigned yet'}</span></div>
          <div class="mini-line"><strong>Items</strong><span>${order.items.map(i => `${i.qty}x ${i.name}`).join(', ')}</span></div>
          <p>Estimated preparation time is shown as a range because kitchen timing can vary.</p>
        </div>`;
    }

    function statusTagClass(s) {
      if (s === 'Order received') return 's-received';
      if (s === 'Accepted') return 's-accepted';
      if (s === 'Preparing') return 's-preparing';
      if (s === 'Assigned to delivery') return 's-assigned';
      if (s === 'Out for delivery') return 's-transit';
      if (s === 'Delivered') return 's-delivered';
      return 's-rejected';
    }

    function renderAssistant() {
      byId('assistant').innerHTML = `
        <h2>AI Menu Assistant</h2>
        <p>Rule-based assistant — recommends only real, available menu items. Conversation is saved for this browser session.</p>
        <div class="notice">No paid AI API used. This keeps the prototype free and deployable on GitHub Pages.</div>
        <div class="card">
          <div id="chatBox" class="chat-box">${chatMessages.map(renderChatMsg).join('')}</div>
          <div class="chat-chips">
            ${['Something sweet','Something spicy','Something filling','Something cheap','I want sushi','I want a drink'].map(p=>`<button class="chip" onclick="quickPrompt('${p}')">${p}</button>`).join('')}
          </div>
          <div class="row"><input id="chatInput" class="input" placeholder="Type your request..." onkeydown="if(event.key==='Enter') sendChat()" /><button class="primary" onclick="sendChat()">Send</button></div>
        </div>
      `;
      setTimeout(() => { const box = byId('chatBox'); if (box) box.scrollTop = box.scrollHeight; }, 10);
    }

    function renderChatMsg(m) {
      if (m.from === 'user') return `<div class="msg user-msg">${escapeHtml(m.text)}</div>`;
      let html = `<div class="msg bot-msg"><div>${m.text}</div>`;
      if (m.items && m.items.length) {
        html += m.items.map(item => `<div class="ai-item-row"><div><strong>${item.name}</strong><br><span style="color:var(--muted);font-size:13px">${money(item.price)} · ${item.reason}</span></div><button class="primary" style="font-size:12px;padding:6px 10px;white-space:nowrap" onclick="addToCart('${item.id}')">Add to Cart</button></div>`).join('');
      }
      html += `</div>`;
      return html;
    }

    function quickPrompt(text) { byId('chatInput').value = text; sendChat(); }
    function sendChat() {
      const input = byId('chatInput');
      const text = input.value.trim();
      if (!text) return;
      chatMessages.push({from: 'user', text, items: []});
      const reply = assistantReply(text);
      chatMessages.push({from: 'bot', text: reply.text, items: reply.items});
      input.value = '';
      saveChat();
      renderAssistant();
    }

    function assistantReply(text) {
      const t = text.toLowerCase();
      let picks = [], label = '';
      if (t.includes('sweet') || t.includes('dessert')) { picks = state.menu.filter(x => x.category === 'Desserts'); label = 'sweet treat'; }
      else if (t.includes('spicy')) { picks = state.menu.filter(x => ['Tacos','Burgers'].includes(x.category)); label = 'bold & spicy'; }
      else if (t.includes('filling') || t.includes('hungry') || t.includes('full') || t.includes('big')) { picks = state.menu.filter(x => ['Plates','Burgers','Pasta'].includes(x.category)); label = 'hearty & filling'; }
      else if (t.includes('cheap') || t.includes('budget') || t.includes('affordable')) { picks = [...state.menu].sort((a,b)=>a.price-b.price); label = 'budget-friendly'; }
      else if (t.includes('sushi')) { picks = state.menu.filter(x => x.category === 'Sushi'); label = 'fresh sushi'; }
      else if (t.includes('drink') || t.includes('juice') || t.includes('beverage')) { picks = state.menu.filter(x => x.category === 'Drinks'); label = 'refreshing drink'; }
      else if (t.includes('light') || t.includes('healthy') || t.includes('calorie')) { picks = state.menu.filter(x => ['Salads','Sushi'].includes(x.category)); label = 'light & healthy'; }
      else if (t.includes('cheese') && (t.includes('no') || t.includes('without'))) { picks = state.menu.filter(x => !x.ingredients.includes('cheese')); label = 'cheese-free'; }
      else { picks = state.menu.filter(x => x.available); label = 'popular today'; }
      picks = picks.filter(x => x.available).slice(0, 3);
      if (!picks.length) return { text: "I couldn't find an available match. Try asking: something sweet, spicy, filling, a drink, or sushi!", items: [] };
      return {
        text: `Here are my top ${label} picks for you:`,
        items: picks.map(x => ({id: x.id, name: x.name, price: x.price, reason: x.desc.split('.')[0]}))
      };
    }

    function renderManager() {
      if (!managerLoggedIn) {
        byId('manager').innerHTML = loginHtml('Manager Login', 'Use PIN 1234 for the demo.', 'managerPin', 'loginManager()');
        return;
      }
      byId('manager').innerHTML = `
        <div class="mgr-shell">
          <div class="mgr-topbar">
            <div class="row"><div class="mgr-logo">FY</div><strong>Manager Dashboard</strong></div>
            <div class="mgr-tabs">
              <button class="${managerTab==='orders'?'active':''}" onclick="managerTab='orders';renderManager()">Orders</button>
              <button class="${managerTab==='menu'?'active':''}" onclick="managerTab='menu';renderManager()">Menu</button>
              <button class="${managerTab==='analytics'?'active':''}" onclick="managerTab='analytics';renderManager()">Dashboard</button>
            </div>
            <div class="row">
              <button class="ghost" onclick="managerLoggedIn=false;renderManager()">Logout</button>
              <button class="danger" onclick="resetDemo()">Reset Demo</button>
            </div>
          </div>
          ${managerTab==='orders' ? managerOrdersHtml() : managerTab==='menu' ? managerMenuHtml() : managerAnalyticsHtml()}
        </div>
      `;
    }


    function loginHtml(title, help, inputId, action) {
      return `<div class="card login-box"><h2>${title}</h2><p>${help}</p><input id="${inputId}" class="input" type="password" placeholder="Enter PIN" onkeydown="if(event.key==='Enter') ${action}" /><button class="primary" style="width:100%;margin-top:12px" onclick="${action}">Enter</button></div>`;
    }

    function loginManager() {
      if (byId('managerPin').value === MANAGER_PIN) { managerLoggedIn = true; renderManager(); }
      else alert('Wrong PIN. Use 1234 for the demo.');
    }

    function getFilteredOrders() {
      const now = new Date();
      return state.orders.filter(o => {
        if (mgrDateFilter === 'Today') { if (new Date(o.createdAt).toDateString() !== now.toDateString()) return false; }
        else if (mgrDateFilter === 'Week') { if (new Date(o.createdAt) < new Date(now - 7*24*60*60*1000)) return false; }
        else if (mgrDateFilter === 'Month') { if (new Date(o.createdAt) < new Date(now - 30*24*60*60*1000)) return false; }
        if (mgrStatusFilter !== 'All' && o.status !== mgrStatusFilter) return false;
        if (mgrSearch) { const s = mgrSearch.toLowerCase(); if (!o.id.toLowerCase().includes(s) && !o.customer.name.toLowerCase().includes(s) && !o.customer.address.toLowerCase().includes(s)) return false; }
        return true;
      });
    }

    function managerOrdersHtml() {
      const filtered = getFilteredOrders();
      const allSelected = filtered.length > 0 && filtered.every(o => selectedOrders.has(o.id));
      return `
        <h2 style="margin-bottom:14px">Orders</h2>
        <div class="mgr-toolbar">
          <select onchange="mgrDateFilter=this.value;renderManager()">
            ${['All','Today','Week','Month'].map(v=>`<option value="${v}" ${mgrDateFilter===v?'selected':''}>${v==='All'?'Date Range ▼':v}</option>`).join('')}
          </select>
          <select onchange="mgrStatusFilter=this.value;renderManager()">
            ${['All','Order received','Accepted','Preparing','Assigned to delivery','Out for delivery','Delivered','Rejected'].map(v=>`<option value="${v}" ${mgrStatusFilter===v?'selected':''}>${v==='All'?'Order Status ▼':v}</option>`).join('')}
          </select>
          <input class="mgr-search" placeholder="🔍 Search orders..." value="${escapeHtml(mgrSearch)}" oninput="mgrSearch=this.value;renderManager()" />
          <select onchange="bulkAction(this.value);this.value=''">
            <option value="">Bulk Actions ▼</option>
            <option value="accept">Accept Selected</option>
            <option value="reject">Reject Selected</option>
          </select>
        </div>
        <div class="mgr-bulk-bar">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" ${allSelected?'checked':''} onchange="toggleSelectAll()" style="width:16px;height:16px" />
            <span>Select All</span>
          </label>
          <span style="color:var(--muted);font-size:13px">${selectedOrders.size} selected · ${filtered.length} orders</span>
        </div>
        ${filtered.map(mgrOrderCard).join('') || '<div class="mgr-order-card"><p>No orders match these filters.</p></div>'}
        <div class="notice" style="margin-top:18px">Demo mode: data is stored locally in this browser.</div>
      `;
    }

    function toggleSelectAll() {
      const filtered = getFilteredOrders();
      if (filtered.every(o => selectedOrders.has(o.id))) { filtered.forEach(o => selectedOrders.delete(o.id)); }
      else { filtered.forEach(o => selectedOrders.add(o.id)); }
      renderManager();
    }

    function toggleSelectOrder(id) {
      if (selectedOrders.has(id)) selectedOrders.delete(id); else selectedOrders.add(id);
      renderManager();
    }

    function bulkAction(action) {
      if (!action || !selectedOrders.size) return;
      if (action === 'accept') {
        selectedOrders.forEach(id => { const o = state.orders.find(x=>x.id===id); if (o && o.status==='Order received') { o.status='Accepted'; o.acceptedAt=Date.now(); } });
      } else if (action === 'reject') {
        if (!confirm(`Reject ${selectedOrders.size} selected orders?`)) return;
        selectedOrders.forEach(id => { const o = state.orders.find(x=>x.id===id); if (o && !['Delivered','Rejected','Cancelled'].includes(o.status)) o.status='Rejected'; });
      }
      selectedOrders.clear(); saveState(); renderAll();
    }

    function mgrOrderCard(o) {
      const isInactive = ['Delivered','Rejected','Cancelled'].includes(o.status);
      const isSelected = selectedOrders.has(o.id);
      return `<div class="mgr-order-card ${isInactive?'muted-card':''}">
        <div class="mgr-order-main">
          <input type="checkbox" ${isSelected?'checked':''} onchange="toggleSelectOrder('${o.id}')" style="width:16px;height:16px;margin-top:3px;cursor:pointer" />
          <div class="mgr-order-info">
            <div class="row" style="gap:8px"><strong>${o.id}</strong><span class="status-tag ${statusTagClass(o.status)}">${o.status}</span></div>
            <div style="font-size:13px">${o.items.map(i=>`${i.qty}x ${i.name}`).join(', ')}</div>
            <div class="stat-label">⏱ ${timeAgo(o.createdAt)} · ${money(o.total)} · ${o.payment}</div>
            <div class="stat-label">📍 ${o.customer.name} — ${o.customer.phone} — ${o.customer.address}</div>
            ${o.status==='Accepted'&&o.acceptedAt?`<div class="stat-label" style="color:var(--accent)">⏳ Kitchen starts in ~${Math.max(0,5-Math.round((Date.now()-o.acceptedAt)/60000))} min</div>`:''}
          </div>
          <div class="mgr-order-actions">${mgrOrderActions(o)}</div>
        </div>
      </div>`;
    }

    function mgrOrderActions(o) {
      switch(o.status) {
        case 'Order received':
          return `<button class="success" onclick="mgAccept('${o.id}')">Accept</button><button class="danger" onclick="mgReject('${o.id}')">Reject</button><button class="ghost" onclick="openOrderDetails('${o.id}')">Details</button>`;
        case 'Accepted':
          return `<div class="notice" style="margin:0;padding:7px 10px;font-size:12px">⏳ Waiting for kitchen timer...</div><button class="ghost" onclick="openOrderDetails('${o.id}')">Details</button>`;
        case 'Preparing':
          return mgrAssignHtml(o) + `<button class="ghost" style="margin-top:4px" onclick="openOrderDetails('${o.id}')">Details</button>`;
        case 'Assigned to delivery':
          return `<span class="status-tag s-assigned" style="font-size:11px">Driver: ${getDeliveryName(o.deliveryId)}</span><button class="primary" onclick="updateOrderStatus('${o.id}','Out for delivery')">Out for Delivery</button><button class="ghost" onclick="showReassignModal('${o.id}')">Reassign</button><button class="ghost" onclick="openOrderDetails('${o.id}')">Details</button>`;
        case 'Out for delivery':
          return `<button class="ghost" onclick="openOrderDetails('${o.id}')">View Details</button>`;
        default:
          return `<span class="tag">Completed</span>`;
      }
    }

    function mgrAssignHtml(o) {
      const avail = state.deliveryPeople.filter(d=>d.available);
      if (!avail.length) return `<div class="notice" style="margin:0;padding:7px 10px;font-size:12px">⚠️ No available delivery person right now.</div>`;
      return `<div class="row" style="flex-wrap:wrap;gap:6px">
        <select id="as_${o.id}" class="input" style="max-width:160px;padding:8px 10px;font-size:13px">
          <option value="">Assign delivery...</option>
          ${state.deliveryPeople.map(d=>`<option value="${d.id}" ${!d.available?'disabled':''} ${o.deliveryId===d.id?'selected':''}>${d.name} ${d.available?'':'(Unavailable)'}</option>`).join('')}
        </select>
        <button class="secondary" style="padding:8px 12px" onclick="doAssign('${o.id}')">Assign</button>
      </div>`;
    }

    function doAssign(orderId) {
      const sel = byId('as_'+orderId); if (!sel) return;
      const deliveryId = sel.value; if (!deliveryId) return alert('Select a delivery person.');
      const driver = state.deliveryPeople.find(d=>d.id===deliveryId);
      if (driver && !driver.available) return alert('This delivery person is currently unavailable.');
      const o = state.orders.find(x=>x.id===orderId);
      if (o) { o.deliveryId = deliveryId; o.status = 'Assigned to delivery'; }
      saveState(); renderAll();
    }

    function showReassignModal(id) {
      const o = state.orders.find(x=>x.id===id);
      showModal(`<h2>Reassign Order ${o.id}</h2>
        <p>Current driver: <strong>${getDeliveryName(o.deliveryId)}</strong></p>
        <select id="reassignSel" class="input">
          <option value="">Select driver...</option>
          ${state.deliveryPeople.map(d=>`<option value="${d.id}" ${!d.available?'disabled':''}>${d.name} ${d.available?'(Available)':'(Unavailable)'}</option>`).join('')}
        </select>
        <div class="row" style="margin-top:14px">
          <button class="primary" onclick="doReassign('${id}')">Reassign</button>
          <button class="secondary" onclick="closeModal()">Cancel</button>
        </div>`);
    }

    function doReassign(orderId) {
      const sel = byId('reassignSel'); if (!sel || !sel.value) return alert('Select a driver.');
      const driver = state.deliveryPeople.find(d=>d.id===sel.value);
      if (driver && !driver.available) return alert('That driver is unavailable.');
      const o = state.orders.find(x=>x.id===orderId);
      if (o) { o.deliveryId = sel.value; o.status = 'Assigned to delivery'; }
      saveState(); renderAll(); closeModal();
    }

    function mgAccept(id) {
      const o = state.orders.find(x=>x.id===id); if (!o) return;
      o.status = 'Accepted'; o.acceptedAt = Date.now();
      saveState(); renderAll();
    }

    function mgReject(id) {
      if (!confirm('Reject this order?')) return;
      const o = state.orders.find(x=>x.id===id); if (!o) return;
      o.status = 'Rejected'; saveState(); renderAll();
    }

    function openOrderDetails(id) {
      const o = state.orders.find(x=>x.id===id);
      showModal(`<h2>Order ${o.id}</h2>
        <div class="mini-line"><strong>Status</strong><span class="status-tag ${statusTagClass(o.status)}">${o.status}</span></div>
        <div class="mini-line"><strong>Customer</strong><span>${o.customer.name}</span></div>
        <div class="mini-line"><strong>Phone</strong><span>${o.customer.phone}</span></div>
        <div class="mini-line"><strong>Address</strong><span>${o.customer.address}</span></div>
        <div class="mini-line"><strong>Instructions</strong><span>${o.customer.instructions || 'None'}</span></div>
        <div class="mini-line"><strong>Payment</strong><span>${o.payment}</span></div>
        <div class="mini-line"><strong>Items</strong><span>${o.items.map(i=>`${i.qty}x ${i.name}`).join(', ')}</span></div>
        <div class="mini-line"><strong>Total</strong><span>${money(o.total)}</span></div>
        <button class="secondary" style="margin-top:14px" onclick="closeModal()">Close</button>`);
    }

    function updateOrderStatus(id, status) {
      const o = state.orders.find(x=>x.id===id); if (!o) return;
      o.status = status;
      saveState(); renderAll();
    }

    function assignDelivery(orderId, deliveryId) {
      const driver = state.deliveryPeople.find(d=>d.id===deliveryId);
      if (driver && !driver.available) return alert('This delivery person is unavailable.');
      const o = state.orders.find(x=>x.id===orderId);
      if (o) { o.deliveryId = deliveryId; if (deliveryId) o.status = 'Assigned to delivery'; }
      saveState(); renderAll();
    }

    function managerMenuHtml() {
      return `<h2 style="margin-bottom:14px">Menu Availability</h2>
        <p style="margin-bottom:16px">Toggle items on or off. Unavailable items cannot be ordered by customers.</p>
        <div class="mgr-order-card">
          ${state.menu.map(item => `
            <div class="staff-line">
              <div><strong>${item.name}</strong><br><span class="tag">${item.category} · ${money(item.price)}</span></div>
              <label class="avail-toggle">
                <span style="font-size:13px;color:${item.available?'var(--green)':'var(--red)'}">${item.available?'Available':'Unavailable'}</span>
                <label class="toggle-sw">
                  <input type="checkbox" ${item.available?'checked':''} onchange="toggleMenuAvailability('${item.id}')" />
                  <span class="toggle-track"></span>
                  <span class="toggle-thumb"></span>
                </label>
              </label>
            </div>`).join('')}
        </div>
        <div class="notice" style="margin-top:14px">Demo mode: data is stored locally in this browser.</div>`;
    }

    function toggleMenuAvailability(id) {
      const item = getMenuItem(id);
      item.available = !item.available;
      saveState(); renderAll();
    }


    function managerAnalyticsHtml() {
      const valid = state.orders.filter(o => !['Rejected', 'Cancelled'].includes(o.status));
      const revenue = valid.reduce((s, o) => s + o.total, 0);
      const itemCounts = {};
      valid.forEach(o => o.items.forEach(i => itemCounts[i.name] = (itemCounts[i.name] || 0) + i.qty));
      const top = Object.entries(itemCounts).sort((a,b) => b[1]-a[1]).slice(0,5);
      const peak = getPeakHours(valid);
      const catCounts = {};
      valid.forEach(o => o.items.forEach(i => { const m = state.menu.find(x=>x.id===i.id); if (m) catCounts[m.category] = (catCounts[m.category]||0) + i.qty; }));
      const cats = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]);
      return `<h2 style="margin-bottom:14px">Dashboard</h2>
        <div class="grid-2">
          <div class="card"><h3>Key Metrics</h3>
            <div class="stat-box"><div class="stat-value">${money(revenue)}</div><div class="stat-label">Total revenue in demo</div></div><br>
            <div class="stat-box"><div class="stat-value">${valid.length}</div><div class="stat-label">Total orders</div></div><br>
            <div class="stat-box"><div class="stat-value">${valid.length ? money(Math.round(revenue / valid.length)) : '0 MAD'}</div><div class="stat-label">Average order value</div></div>
          </div>
          <div class="card"><h3>Most Ordered Items</h3>${top.length ? top.map(([name,count]) => `<div class="mini-line"><span>${name}</span><strong>${count}</strong></div>`).join('') : '<p>No order data yet.</p>'}</div>
          <div class="card"><h3>Peak Demand Times</h3>${peak.map(([hour,count]) => `<div class="mini-line"><span>${hour}:00–${hour}:59</span><strong>${count} orders</strong></div>`).join('') || '<p>No data yet.</p>'}</div>
          <div class="card"><h3>Category Breakdown</h3>${cats.length ? cats.map(([cat,count]) => `<div class="mini-line"><span>${cat}</span><strong>${count} items</strong></div>`).join('') : '<p>No order data yet.</p>'}</div>
        </div>
        <div class="notice" style="margin-top:18px">Demo mode: data is stored locally in this browser.</div>`;
    }

    function getPeakHours(orders) {
      const counts = {};
      orders.forEach(o => { const h = new Date(o.createdAt).getHours(); counts[h] = (counts[h] || 0) + 1; });
      return Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,4);
    }

    
function renderDelivery() {
      if (!deliveryLoggedIn) {
        byId('delivery').innerHTML = loginHtml('Delivery Login', 'Use PIN 2222 for the demo.', 'deliveryPin', 'loginDelivery()');
        return;
      }
      ensureDeliveryShiftData();
      const currentDriver = state.deliveryPeople.find(d => d.id === deliveryPersonId) || state.deliveryPeople[0];
      byId('delivery').innerHTML = `
        <div class="delivery-shell">
          <div class="delivery-top">
            <div class="row"><div class="delivery-logo">FY</div><strong>Delivery Management</strong></div>
            <div class="delivery-tabs">
              <button class="${deliveryTab === 'orders' ? 'active' : ''}" onclick="deliveryTab='orders'; renderDelivery()">Orders</button>
              <button class="${deliveryTab === 'availability' ? 'active' : ''}" onclick="deliveryTab='availability'; renderDelivery()">Availabilities</button>
            </div>
            <div class="row">
              <select class="input" style="width:190px" onchange="deliveryPersonId=this.value; renderDelivery()">${state.deliveryPeople.map(d => `<option value="${d.id}" ${deliveryPersonId === d.id ? 'selected' : ''}>${d.name}</option>`).join('')}</select>
              <div class="profile-pill">${currentDriver.name ? currentDriver.name[0] : 'P'}</div>
              <button class="ghost" onclick="deliveryLoggedIn=false; renderDelivery()">Logout</button>
            </div>
          </div>
          ${deliveryTab === 'orders' ? deliveryOrdersPage(currentDriver) : deliveryAvailabilityPage(currentDriver)}
        </div>`;
    }

    function loginDelivery() {
      if (byId('deliveryPin').value === DELIVERY_PIN) { deliveryLoggedIn = true; deliveryTab = 'orders'; renderDelivery(); }
      else alert('Wrong PIN. Use 2222 for the demo.');
    }

    function deliveryOrdersPage(driver) {
      // Show only orders assigned to this driver
      const assigned = state.orders.filter(o => o.deliveryId === driver.id);
      const sorted = [...assigned].sort((a,b) => {
        const rank = s => s === 'Out for delivery' ? 0 : s === 'Assigned to delivery' ? 1 : s === 'Delivered' ? 2 : 3;
        return rank(a.status) - rank(b.status);
      });
      return `
        <div class="delivery-title-row"><h2 style="margin:0">My Orders</h2><span class="order-count">${sorted.length} orders</span></div>
        ${sorted.map(o => deliveryOrderCard(o, driver)).join('') || '<div class="delivery-order-card"><p>No orders assigned to you right now.</p></div>'}
        <div class="delivery-legend">
          <strong>Legend:</strong>
          <span class="status-pill dark">In Transit</span>
          <span class="status-pill pending">Assigned</span>
          <span class="status-pill delivered">Delivered</span>
          <span class="tag">Muted card = completed / inactive order</span>
        </div>`;
    }

    function deliveryOrderCard(o, driver) {
      const delivered = o.status === 'Delivered';
      const isOutForDelivery = o.status === 'Out for delivery';
      const isAssigned = o.status === 'Assigned to delivery';
      const driverAccepted = o.deliveryAccepted;

      let statusLabel, pillClass;
      if (delivered) { statusLabel = 'Delivered'; pillClass = 'delivered'; }
      else if (isOutForDelivery && driverAccepted) { statusLabel = 'In Transit'; pillClass = 'dark'; }
      else if (isOutForDelivery) { statusLabel = 'Pending Acceptance'; pillClass = 'pending'; }
      else { statusLabel = 'Assigned'; pillClass = 'pending'; }

      // Smart buttons — never show all three at once
      let actionButtons;
      if (delivered) {
        actionButtons = `<button class="secondary" onclick="showDeliveryDetails('${o.id}')">View Details</button><span class="tag green">Completed</span>`;
      } else if (isOutForDelivery && driverAccepted) {
        // Driver accepted — show only Mark as Delivered
        actionButtons = `<button class="secondary" onclick="showDeliveryDetails('${o.id}')">View Details</button><button class="delivery-primary-wide" onclick="markDeliveryDelivered('${o.id}')">Mark as Delivered</button>`;
      } else {
        // Assigned or Out for delivery but not accepted yet — show Accept + Reject
        actionButtons = `<button class="secondary" onclick="showDeliveryDetails('${o.id}')">View Details</button><button class="success" onclick="acceptDeliveryOrder('${o.id}')">Accept</button><button class="danger" onclick="rejectDeliveryOrder('${o.id}')">Reject</button>`;
      }

      return `
        <div class="delivery-order-card ${delivered ? 'muted' : ''}">
          <div class="delivery-card-main">
            <div><h3 style="margin:0">${o.id}</h3><span class="status-pill ${pillClass}">${statusLabel}</span></div>
            <div>
              <div class="mini-line"><strong>Customer</strong><span>${o.customer.name}</span></div>
              <div class="mini-line"><strong>Address</strong><span>${o.customer.address}</span></div>
              <div class="mini-line"><strong>Phone</strong><span>${o.customer.phone}</span></div>
            </div>
            <strong>${money(o.total)}</strong>
          </div>
          <div class="delivery-actions">${actionButtons}</div>
        </div>`;
    }

    function showDeliveryDetails(id) {
      const o = state.orders.find(x => x.id === id);
      if (!o) return;
      showModal(`<h2>${o.id}</h2>
        <div class="mini-line"><strong>Status</strong><span class="status-tag ${statusTagClass(o.status)}">${o.status}</span></div>
        <div class="mini-line"><strong>Customer</strong><span>${o.customer.name}</span></div>
        <div class="mini-line"><strong>Phone</strong><span>${o.customer.phone}</span></div>
        <div class="mini-line"><strong>Address</strong><span>${o.customer.address}</span></div>
        <div class="mini-line"><strong>Items</strong><span>${o.items.map(i => `${i.qty}x ${i.name}`).join(', ')}</span></div>
        <div class="mini-line"><strong>Payment</strong><span>${o.payment}</span></div>
        <h3>Total: ${money(o.total)}</h3>
        <button class="secondary" onclick="closeModal()">Close</button>`);
    }

    function acceptDeliveryOrder(id) {
      const o = state.orders.find(x => x.id === id);
      if (!o) return;
      o.deliveryAccepted = true;
      // Ensure status is Out for delivery when driver accepts
      if (o.status === 'Assigned to delivery') o.status = 'Out for delivery';
      saveState(); renderAll();
    }

    function rejectDeliveryOrder(id) {
      const o = state.orders.find(x => x.id === id);
      if (!o) return;
      if (confirm('Reject this delivery assignment? The order will return to the manager for reassignment.')) {
        o.deliveryId = '';
        o.deliveryAccepted = false;
        o.status = 'Preparing'; // Return to manager for reassignment
        saveState(); renderAll();
      }
    }

    function markDeliveryDelivered(id) {
      const o = state.orders.find(x => x.id === id);
      if (!o) return;
      o.status = 'Delivered';
      o.deliveryAccepted = false;
      saveState(); renderAll();
    }

    function ensureDeliveryShiftData() {
      if (!state.deliveryShifts) {
        const now = new Date();
        const iso = d => d.toISOString().slice(0,10);
        state.deliveryShifts = [
          {id:'s1',driverId:'d1',date:iso(new Date(now.getFullYear(), now.getMonth(), 3)),start:'12:00',end:'16:00'},
          {id:'s2',driverId:'d1',date:iso(new Date(now.getFullYear(), now.getMonth(), 10)),start:'18:00',end:'22:00'},
          {id:'s3',driverId:'d1',date:iso(new Date(now.getFullYear(), now.getMonth(), 15)),start:'13:00',end:'18:00'},
          {id:'s4',driverId:'d1',date:iso(new Date(now.getFullYear(), now.getMonth(), 24)),start:'19:00',end:'23:00'}
        ];
        saveState();
      }
    }

    function deliveryAvailabilityPage(driver) {
      const shifts = state.deliveryShifts.filter(s => s.driverId === driver.id);
      const delivered = state.orders.filter(o => o.deliveryId === driver.id && o.status === 'Delivered').length;
      const active = state.orders.filter(o => o.deliveryId === driver.id && !['Delivered','Rejected','Cancelled'].includes(o.status)).length;
      const hours = shifts.reduce((sum,s) => sum + shiftHours(s), 0);
      return `
        <h2>Delivery Management</h2>
        <p>Manage your availability and scheduled shifts.</p>
        <div class="delivery-grid">
          <div>
            <div class="performance-card">
              <div class="row" style="justify-content:space-between"><h3>Weekly Performance</h3><span class="tag">This week</span></div>
              <div class="grid-2" style="align-items:center">
                <div><span class="stat-label">TOTAL ORDERS DELIVERED</span><div class="stat-box" style="margin-top:8px"><div class="stat-value">${delivered}</div></div></div>
                <div class="bar-chart">${[2,4,3,5,6,8,4].map(h => `<span style="height:${h*6}px"></span>`).join('')}</div>
              </div>
            </div>
            <button class="secondary" style="width:100%;margin:14px 0" onclick="addDeliveryShift()">+ Add New Availability</button>
            <h3>Scheduled shifts</h3>
            ${shifts.map(shiftRow).join('') || '<div class="card"><p>No scheduled shifts yet.</p></div>'}
          </div>
          <div>
            <div class="calendar-card">
              <div class="row" style="justify-content:space-between"><strong>${new Date().toLocaleString('en',{month:'long',year:'numeric'})}</strong><span class="row"><button class="secondary" style="padding:5px 9px">‹</button><button class="secondary" style="padding:5px 9px">›</button></span></div>
              ${calendarHtml(shifts)}
            </div>
            <h3 style="margin-top:18px">Quick stats</h3>
            <div class="quick-stat"><span>Shifts this week</span><strong>${shifts.length}</strong></div>
            <div class="quick-stat"><span>Hours scheduled</span><strong>${hours}</strong></div>
            <div class="quick-stat"><span>Orders pending</span><strong>${active}</strong></div>
            <button class="${driver.available ? 'success' : 'danger'}" style="width:100%;margin-top:8px" onclick="toggleDeliveryAvailability('${driver.id}')">${driver.available ? 'Available' : 'Unavailable'} — toggle</button>
          </div>
        </div>`;
    }

    function shiftRow(s) {
      return `<div class="shift-row">
        <span class="shift-dot"></span>
        <strong>${s.date}</strong>
        <span>${s.start} - ${s.end}</span>
        <span>${shiftHours(s)} hrs</span>
        <button class="ghost" onclick="deleteDeliveryShift('${s.id}')">Delete</button>
      </div>`;
    }

    function shiftHours(s) {
      const [sh,sm] = s.start.split(':').map(Number), [eh,em] = s.end.split(':').map(Number);
      return Math.max(0, Math.round(((eh*60+em)-(sh*60+sm))/60));
    }

    function calendarHtml(shifts) {
      const now = new Date(), y = now.getFullYear(), m = now.getMonth();
      const days = new Date(y,m+1,0).getDate();
      const start = new Date(y,m,1).getDay();
      const shiftDays = new Set(shifts.map(s => Number(s.date.slice(-2))));
      let cells = ['M','T','W','T','F','S','S'].map(d => `<div class="calendar-day"><strong>${d}</strong></div>`).join('');
      const mondayStart = (start + 6) % 7;
      for (let i=0; i<mondayStart; i++) cells += `<div></div>`;
      for (let d=1; d<=days; d++) {
        const isToday = d === now.getDate();
        cells += `<div class="calendar-day ${shiftDays.has(d) ? 'has-shift' : ''} ${isToday ? 'selected' : ''}">${d}</div>`;
      }
      return `<div class="calendar-grid">${cells}</div><div class="row" style="margin-top:10px"><span class="tag">scheduled shift</span><span class="tag dark">selected date</span></div>`;
    }

    function addDeliveryShift() {
      const date = prompt('Date for availability? Use format YYYY-MM-DD');
      if (!date) return;
      const start = prompt('Start time? Example: 12:00','12:00') || '12:00';
      const end = prompt('End time? Example: 16:00','16:00') || '16:00';
      state.deliveryShifts.push({id:'s'+Date.now(),driverId:deliveryPersonId,date,start,end});
      saveState();
      renderDelivery();
    }

    function deleteDeliveryShift(id) {
      state.deliveryShifts = state.deliveryShifts.filter(s => s.id !== id);
      saveState();
      renderDelivery();
    }

    function toggleDeliveryAvailability(id) {
      const d = state.deliveryPeople.find(x => x.id === id);
      d.available = !d.available;
      saveState();
      renderAll();
    }

    function timeAgo(dateString) {
      const mins = Math.max(0, Math.round((Date.now() - new Date(dateString).getTime()) / 60000));
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins} min ago`;
      return `${Math.round(mins/60)} h ago`;
    }

    function showModal(html) {
      byId('modal').innerHTML = html;
      byId('modalBackdrop').classList.add('show');
    }
    function closeModal() { byId('modalBackdrop').classList.remove('show'); }
    byId('modalBackdrop').addEventListener('click', e => { if (e.target.id === 'modalBackdrop') closeModal(); });

    function resetDemo() {
      if (!confirm('Reset all demo orders, menu availability, cart, and chat?')) return;
      localStorage.removeItem(STORE_KEY);
      state = loadState();
      renderAll();
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c]));
    }

    renderAll();
  </script>
</body>
</html>
